<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live GPS Tracker | Google Maps Dashboard</title>
    <!-- Google Maps API - Note: Replace YOUR_API_KEY with an actual key -->
    <script src="https://maps.googleapis.com/maps/api/js?key=YOUR_API_KEY&libraries=geometry"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --secondary: #059669;
            --accent: #d97706;
            --bg-light: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-dim: #64748b;
            --border: #e2e8f0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-light);
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .dashboard {
            display: grid;
            grid-template-columns: 380px 1fr;
            height: 100vh;
            gap: 0;
        }

        /* Sidebar Styling */
        .sidebar {
            background: var(--card-bg);
            border-right: 1px solid var(--border);
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            z-index: 10;
            overflow-y: auto;
            box-shadow: 4px 0 10px rgba(0, 0, 0, 0.05);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 0.5rem;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            box-shadow: 0 4px 10px rgba(37, 99, 235, 0.2);
        }

        .logo h1 {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-main);
            letter-spacing: -0.5px;
        }

        .status-card {
            background: #f1f5f9;
            border-radius: 16px;
            padding: 1.25rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            transition: all 0.3s ease;
        }

        .status-card.connected {
            background: #ecfdf5;
            border: 1px solid #a7f3d0;
        }

        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #94a3b8;
            position: relative;
        }

        .connected .status-dot {
            background: var(--secondary);
        }

        .connected .status-dot::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: var(--secondary);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
                opacity: 0.8;
            }

            100% {
                transform: scale(2.5);
                opacity: 0;
            }
        }

        .status-info h3 {
            font-size: 0.875rem;
            color: var(--text-dim);
            font-weight: 500;
            margin-bottom: 2px;
        }

        .status-info p {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-main);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .stat-item {
            background: #f8fafc;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1rem;
        }

        .stat-label {
            display: block;
            font-size: 0.75rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.5rem;
        }

        .stat-value {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-main);
        }

        .coordinates-box {
            background: #f1f5f9;
            border-radius: 12px;
            padding: 1rem;
            margin-top: 1rem;
        }

        .coord-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
        }

        .coord-row:last-child {
            margin-bottom: 0;
        }

        /* Map Container */
        .map-section {
            position: relative;
            height: 100%;
        }

        #map {
            height: 100%;
            width: 100%;
        }

        .map-overlay {
            position: absolute;
            top: 1rem;
            right: 1rem;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .overlay-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(8px);
            border: 1px solid var(--border);
            padding: 0.5rem 1rem;
            border-radius: 8px;
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--text-main);
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        }

        @media (max-width: 1024px) {
            .dashboard {
                grid-template-columns: 1fr;
                grid-template-rows: auto 1fr;
            }

            .sidebar {
                height: auto;
                border-right: none;
                border-bottom: 1px solid var(--border);
            }

            #map {
                height: 500px;
            }
        }
    </style>
</head>

<body>
    <div class="dashboard">
        <aside class="sidebar">
            <div class="logo">
                <div class="logo-icon">🚗</div>
                <h1>FleetTrace</h1>
            </div>

            <div class="status-card" id="statusCard">
                <div class="status-dot"></div>
                <div class="status-info">
                    <h3>Device Status</h3>
                    <p id="statusText">Awaiting GPS data...</p>
                </div>
            </div>

            <div class="stats-grid">
                <div class="stat-item">
                    <span class="stat-label">Device IMEI</span>
                    <div class="stat-value" id="imei">--</div>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Speed</span>
                    <div class="stat-value"><span id="speed">0.0</span> <small>km/h</small></div>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Altitude</span>
                    <div class="stat-value"><span id="altitude">0</span> <small>m</small></div>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Network</span>
                    <div class="stat-value" style="color: var(--secondary)">LTE Online</div>
                </div>
            </div>

            <div class="data-section">
                <span class="stat-label">Live Coordinates</span>
                <div class="coordinates-box">
                    <div class="coord-row">
                        <span style="color: var(--text-dim)">Latitude</span>
                        <span id="latitude" class="stat-value">0.000000</span>
                    </div>
                    <div class="coord-row">
                        <span style="color: var(--text-dim)">Longitude</span>
                        <span id="longitude" class="stat-value">0.000000</span>
                    </div>
                </div>
            </div>

            <div class="data-section">
                <span class="stat-label">System Deployment</span>
                <div class="coordinates-box"
                    style="font-size: 0.85rem; background: #fffbeb; border: 1px solid #fde68a;">
                    <div class="coord-row">
                        <span>Web Interface</span>
                        <span style="color: var(--accent); font-weight: 600;">3.108.114.12:3000</span>
                    </div>
                    <div class="coord-row">
                        <span>GPS TCP Port</span>
                        <span style="color: var(--accent); font-weight: 600;">5000</span>
                    </div>
                </div>
            </div>

            <div style="margin-top: auto;">
                <p style="font-size: 0.75rem; color: var(--text-dim); text-align: center;">
                    Last Sync: <span id="timestamp">--</span>
                </p>
            </div>
        </aside>

        <main class="map-section">
            <div id="map"></div>
            <div class="map-overlay">
                <div class="overlay-card">Google Maps Live</div>
                <div class="overlay-card" style="color: var(--secondary)">High Precision SVG Tracking</div>
            </div>
        </main>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        let map;
        let vehicleMarker;
        let polyline;
        const vehiclePath = [];

        // SVG Vehicle Icon
        const vehicleSvg = `
            <svg width="40" height="40" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <circle cx="50" cy="50" r="45" fill="white" stroke="#2563eb" stroke-width="5" />
                <path d="M75 50L35 30V70L75 50Z" fill="#2563eb" />
            </svg>
        `;

        function initMap() {
            map = new google.maps.Map(document.getElementById("map"), {
                center: { lat: 0, lng: 0 },
                zoom: 2,
                mapId: "fb92b8d002fde062", // Regular light map
                disableDefaultUI: false,
                zoomControl: true,
                mapTypeControl: true,
                streetViewControl: false,
                fullscreenControl: true
            });

            polyline = new google.maps.Polyline({
                path: [],
                geodesic: true,
                strokeColor: "#2563eb",
                strokeOpacity: 0.8,
                strokeWeight: 4,
                map: map
            });
        }

        // Initialize Google Map
        window.onload = initMap;

        const socket = io();

        socket.on('locationUpdate', (data) => {
            console.log('Update:', data);
            const { latest, path } = data;

            if (latest.latitude !== 0) {
                updateUI(latest);
                updateMap(latest.latitude, latest.longitude, path);
            }
        });

        function updateUI(data) {
            document.getElementById('statusCard').classList.add('connected');
            document.getElementById('statusText').textContent = 'Stable Connection';

            document.getElementById('latitude').textContent = data.latitude.toFixed(6);
            document.getElementById('longitude').textContent = data.longitude.toFixed(6);
            document.getElementById('imei').textContent = data.imei || 'GPS-99';
            document.getElementById('speed').textContent = data.speed ? data.speed.toFixed(1) : '0.0';
            document.getElementById('altitude').textContent = data.altitude ? data.altitude.toFixed(0) : '0';

            if (data.timestamp) {
                const date = new Date(data.timestamp);
                document.getElementById('timestamp').textContent = date.toLocaleTimeString();
            }
        }

        function updateMap(lat, lon, path) {
            const position = { lat: lat, lng: lon };

            // Update Polyline
            if (path && path.length > 0) {
                const googlePath = path.map(p => ({ lat: p[0], lng: p[1] }));
                polyline.setPath(googlePath);
            }

            // Update Marker
            if (!vehicleMarker) {
                vehicleMarker = new google.maps.Marker({
                    position: position,
                    map: map,
                    title: "Vehicle Location",
                    icon: {
                        url: 'data:image/svg+xml;charset=UTF-8,' + encodeURIComponent(vehicleSvg),
                        scaledSize: new google.maps.Size(40, 40),
                        anchor: new google.maps.Point(20, 20)
                    },
                    optimized: false
                });
            } else {
                vehicleMarker.setPosition(position);
            }

            // Center and zoom if needed
            if (map.getZoom() < 5) {
                map.setZoom(15);
            }
            map.panTo(position);
        }

        // Initial Load
        fetch('/api/location')
            .then(res => res.json())
            .then(data => {
                if (data.latest && data.latest.latitude !== 0) {
                    updateUI(data.latest);
                    if (map) updateMap(data.latest.latitude, data.latest.longitude, data.path);
                }
            });
    </script>
</body>

</html>
