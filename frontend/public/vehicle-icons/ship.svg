<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40">
  <!-- Steel grey large ship hull -->
  <path d="M20 2 C15 2,9 8,9 20 C9 30,14 39,20 39 C26 39,31 30,31 20 C31 8,25 2,20 2 Z" fill="#334155"/>
  <!-- Deck (lighter grey) -->
  <ellipse cx="20" cy="22" rx="9" ry="14" fill="#475569"/>
  <!-- Bridge / superstructure (center) -->
  <rect x="15" y="12" width="10" height="12" rx="2" fill="#64748b"/>
  <!-- Bridge windows -->
  <rect x="16" y="13" width="8" height="4" rx="1" fill="rgba(147,210,255,0.7)"/>
  <!-- Cargo hold markings -->
  <rect x="11" y="26" width="18" height="6" rx="1" fill="rgba(0,0,0,0.2)"/>
  <rect x="14" y="27" width="5" height="4" rx="0.5" fill="rgba(0,0,0,0.15)"/>
  <rect x="21" y="27" width="5" height="4" rx="0.5" fill="rgba(0,0,0,0.15)"/>
  <!-- Anchor symbol (white, front) -->
  <circle cx="20" cy="7" r="2.5" fill="#94a3b8"/>
  <rect x="19.5" y="7" width="1" height="4" fill="#94a3b8"/>
  <!-- Bow nav light -->
  <circle cx="20" cy="3" r="1.5" fill="#fef08a"/>
  <!-- Stern lights -->
  <circle cx="14" cy="37.5" r="1.5" fill="#f87171"/>
  <circle cx="26" cy="37.5" r="1.5" fill="#4ade80"/>
  <!-- Hull waterline stripe (red anti-fouling) -->
  <path d="M10 32 Q10 38,20 39 Q30 38,30 32 Z" fill="#7f1d1d" opacity="0.5"/>
  <!-- Wake lines -->
  <path d="M9 28 Q7 31,8 34" stroke="#94a3b8" stroke-width="1" fill="none" opacity="0.5"/>
  <path d="M31 28 Q33 31,32 34" stroke="#94a3b8" stroke-width="1" fill="none" opacity="0.5"/>
</svg>
