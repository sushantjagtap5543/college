<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40">
  <!-- Wider body -->
  <rect x="10" y="4" width="20" height="33" rx="5" fill="#475569"/>
  <!-- Roof rack bars -->
  <rect x="13" y="5.5" width="14" height="1.5" rx="0.5" fill="rgba(0,0,0,0.3)"/>
  <rect x="13" y="8" width="14" height="1" rx="0.5" fill="rgba(0,0,0,0.18)"/>
  <!-- Front windshield -->
  <rect x="12" y="9" width="16" height="7.5" rx="2" fill="rgba(147,210,255,0.75)"/>
  <!-- Cabin body -->
  <rect x="11" y="16.5" width="18" height="9.5" rx="1.5" fill="rgba(255,255,255,0.07)"/>
  <!-- Rear window -->
  <rect x="12" y="26.5" width="16" height="5" rx="2" fill="rgba(147,210,255,0.55)"/>
  <!-- Headlights -->
  <rect x="10.5" y="4.5" width="5" height="2.5" rx="1" fill="#fef08a"/>
  <rect x="24.5" y="4.5" width="5" height="2.5" rx="1" fill="#fef08a"/>
  <!-- Taillights -->
  <rect x="10.5" y="33.5" width="5" height="2.5" rx="1" fill="#f87171"/>
  <rect x="24.5" y="33.5" width="5" height="2.5" rx="1" fill="#f87171"/>
  <!-- Side body trim line -->
  <rect x="10" y="20" width="20" height="1" fill="rgba(255,255,255,0.15)"/>
  <!-- Wheels -->
  <rect x="7" y="7" width="3.5" height="7" rx="1.5" fill="#1e293b"/>
  <rect x="29.5" y="7" width="3.5" height="7" rx="1.5" fill="#1e293b"/>
  <rect x="7" y="27" width="3.5" height="7" rx="1.5" fill="#1e293b"/>
  <rect x="29.5" y="27" width="3.5" height="7" rx="1.5" fill="#1e293b"/>
  <!-- Wheel rims -->
  <rect x="8" y="9" width="1.5" height="3" rx="0.5" fill="#64748b"/>
  <rect x="30.5" y="9" width="1.5" height="3" rx="0.5" fill="#64748b"/>
  <rect x="8" y="29" width="1.5" height="3" rx="0.5" fill="#64748b"/>
  <rect x="30.5" y="29" width="1.5" height="3" rx="0.5" fill="#64748b"/>
</svg>
