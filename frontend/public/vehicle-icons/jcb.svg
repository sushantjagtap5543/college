<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40">
  <!-- Yellow JCB body -->
  <rect x="11" y="10" width="18" height="20" rx="3" fill="#ca8a04"/>
  <!-- Cab (yellow, slightly brighter) -->
  <rect x="11" y="10" width="11" height="12" rx="2" fill="#eab308"/>
  <!-- Cab windshield (large glass) -->
  <rect x="12" y="11" width="9" height="8" rx="1.5" fill="rgba(147,210,255,0.8)"/>
  <!-- Boom arm (orange/dark) -->
  <rect x="22" y="7" width="5" height="23" rx="2" fill="#b45309"/>
  <!-- Boom highlight -->
  <rect x="23" y="8" width="2" height="20" rx="1" fill="rgba(255,255,255,0.15)"/>
  <!-- Bucket (darker) -->
  <path d="M19 30 L31 30 L29 38 L21 38 Z" fill="#92400e"/>
  <!-- Bucket teeth -->
  <rect x="21" y="37" width="2.5" height="2" rx="0.5" fill="#78350f"/>
  <rect x="24.5" y="37" width="2.5" height="2" rx="0.5" fill="#78350f"/>
  <rect x="27.5" y="37" width="1.5" height="2" rx="0.5" fill="#78350f"/>
  <!-- Black rubber tracks -->
  <rect x="6" y="9" width="5" height="22" rx="2.5" fill="#1e293b"/>
  <rect x="29" y="9" width="5" height="22" rx="2.5" fill="#1e293b"/>
  <!-- Track guide teeth (yellow/grey) -->
  <rect x="7" y="12" width="3" height="2.5" rx="0.5" fill="#ca8a04"/>
  <rect x="7" y="17" width="3" height="2.5" rx="0.5" fill="#ca8a04"/>
  <rect x="7" y="22" width="3" height="2.5" rx="0.5" fill="#ca8a04"/>
  <rect x="30" y="12" width="3" height="2.5" rx="0.5" fill="#ca8a04"/>
  <rect x="30" y="17" width="3" height="2.5" rx="0.5" fill="#ca8a04"/>
  <rect x="30" y="22" width="3" height="2.5" rx="0.5" fill="#ca8a04"/>
  <!-- Drive sprocket wheel -->
  <circle cx="8.5" cy="9.5" r="3" fill="#374151"/>
  <circle cx="31.5" cy="9.5" r="3" fill="#374151"/>
  <circle cx="8.5" cy="30.5" r="3" fill="#374151"/>
  <circle cx="31.5" cy="30.5" r="3" fill="#374151"/>
</svg>
