<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40">
  <!-- Grey cab -->
  <rect x="10" y="2" width="20" height="12" rx="4" fill="#64748b"/>
  <!-- Cab windshield -->
  <rect x="12" y="4" width="16" height="6.5" rx="2" fill="rgba(147,210,255,0.75)"/>
  <!-- Divider bar -->
  <rect x="10" y="13.5" width="20" height="2" fill="#475569"/>
  <!-- White box body -->
  <rect x="10" y="15" width="20" height="23" rx="2" fill="#f1f5f9"/>
  <!-- Box door lines -->
  <rect x="20" y="15" width="1" height="23" fill="rgba(0,0,0,0.1)"/>
  <rect x="10" y="28" width="20" height="1" fill="rgba(0,0,0,0.08)"/>
  <!-- Company branding area (subtle) -->
  <rect x="13" y="19" width="14" height="7" rx="1" fill="rgba(0,0,0,0.04)"/>
  <!-- Headlights -->
  <rect x="10" y="3" width="5" height="2.5" rx="1" fill="#fef08a"/>
  <rect x="25" y="3" width="5" height="2.5" rx="1" fill="#fef08a"/>
  <!-- Taillights -->
  <rect x="10" y="35.5" width="5" height="2.5" rx="1" fill="#f87171"/>
  <rect x="25" y="35.5" width="5" height="2.5" rx="1" fill="#f87171"/>
  <!-- Front wheels -->
  <rect x="7" y="4" width="3.5" height="7" rx="1.5" fill="#1e293b"/>
  <rect x="29.5" y="4" width="3.5" height="7" rx="1.5" fill="#1e293b"/>
  <!-- Rear wheels -->
  <rect x="7" y="28" width="3.5" height="5.5" rx="1.5" fill="#1e293b"/>
  <rect x="29.5" y="28" width="3.5" height="5.5" rx="1.5" fill="#1e293b"/>
  <rect x="7" y="34" width="3.5" height="4" rx="1.5" fill="#1e293b"/>
  <rect x="29.5" y="34" width="3.5" height="4" rx="1.5" fill="#1e293b"/>
</svg>
