<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40">
  <!-- Dark grey cab -->
  <rect x="13" y="2" width="14" height="11" rx="4" fill="#374151"/>
  <!-- Cab windshield -->
  <rect x="14.5" y="4" width="11" height="6" rx="1.5" fill="rgba(147,210,255,0.75)"/>
  <!-- Cab–tank connector -->
  <rect x="16" y="12" width="8" height="2" fill="#4b5563"/>
  <!-- Silver cylindrical tank (oval = top view) -->
  <ellipse cx="20" cy="26" rx="9" ry="13" fill="#94a3b8"/>
  <!-- Tank highlight (shine) -->
  <ellipse cx="17" cy="22" rx="3" ry="6" fill="rgba(255,255,255,0.25)"/>
  <!-- Tank ring bands -->
  <ellipse cx="20" cy="17.5" rx="8.5" ry="1.5" fill="rgba(0,0,0,0.18)"/>
  <ellipse cx="20" cy="22.5" rx="8.5" ry="1.5" fill="rgba(0,0,0,0.18)"/>
  <ellipse cx="20" cy="27.5" rx="8.5" ry="1.5" fill="rgba(0,0,0,0.18)"/>
  <ellipse cx="20" cy="32.5" rx="8.5" ry="1.5" fill="rgba(0,0,0,0.15)"/>
  <!-- Hazmat stripe (orange/white — fuel tanker) -->
  <rect x="11" y="36" width="18" height="2" rx="0.5" fill="#f97316"/>
  <!-- Headlights -->
  <rect x="13" y="3" width="4" height="2" rx="1" fill="#fef08a"/>
  <rect x="23" y="3" width="4" height="2" rx="1" fill="#fef08a"/>
  <!-- Taillights -->
  <rect x="13" y="37.5" width="4" height="2" rx="1" fill="#f87171"/>
  <rect x="23" y="37.5" width="4" height="2" rx="1" fill="#f87171"/>
  <!-- Front wheels -->
  <rect x="7" y="4" width="3.5" height="7" rx="1.5" fill="#1e293b"/>
  <rect x="29.5" y="4" width="3.5" height="7" rx="1.5" fill="#1e293b"/>
  <!-- Rear dual wheels -->
  <rect x="7" y="29" width="3.5" height="5" rx="1.5" fill="#1e293b"/>
  <rect x="29.5" y="29" width="3.5" height="5" rx="1.5" fill="#1e293b"/>
  <rect x="7" y="35" width="3.5" height="4" rx="1.5" fill="#1e293b"/>
  <rect x="29.5" y="35" width="3.5" height="4" rx="1.5" fill="#1e293b"/>
</svg>
