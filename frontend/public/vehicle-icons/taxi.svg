<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40">
  <!-- Yellow taxi body -->
  <rect x="12" y="4" width="16" height="32" rx="6" fill="#eab308"/>
  <!-- Windshield -->
  <rect x="14" y="8" width="12" height="7" rx="2" fill="rgba(147,210,255,0.75)"/>
  <!-- Cabin body -->
  <rect x="13" y="15" width="14" height="9" rx="2" fill="rgba(202,138,4,0.6)"/>
  <!-- Rear window -->
  <rect x="14" y="25" width="12" height="5" rx="2" fill="rgba(147,210,255,0.55)"/>
  <!-- Taxi checkered stripe -->
  <rect x="12" y="19" width="4" height="2" fill="#1e293b"/>
  <rect x="16" y="19" width="4" height="2" fill="#fef08a"/>
  <rect x="20" y="19" width="4" height="2" fill="#1e293b"/>
  <rect x="24" y="19" width="4" height="2" fill="#fef08a"/>
  <!-- Taxi sign on roof -->
  <rect x="16" y="6" width="8" height="2.5" rx="1" fill="white"/>
  <!-- Headlights -->
  <rect x="13" y="5" width="4.5" height="2.5" rx="1" fill="#fef08a"/>
  <rect x="22.5" y="5" width="4.5" height="2.5" rx="1" fill="#fef08a"/>
  <!-- Taillights (orange on yellow) -->
  <rect x="13" y="32.5" width="4.5" height="2.5" rx="1" fill="#f97316"/>
  <rect x="22.5" y="32.5" width="4.5" height="2.5" rx="1" fill="#f97316"/>
  <!-- Wheels -->
  <rect x="9" y="7" width="3.5" height="6" rx="1.5" fill="#1e293b"/>
  <rect x="27.5" y="7" width="3.5" height="6" rx="1.5" fill="#1e293b"/>
  <rect x="9" y="27" width="3.5" height="6" rx="1.5" fill="#1e293b"/>
  <rect x="27.5" y="27" width="3.5" height="6" rx="1.5" fill="#1e293b"/>
</svg>
