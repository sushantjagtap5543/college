<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40">
  <!-- Body -->
  <rect x="9" y="3" width="22" height="34" rx="4" fill="#94a3b8"/>
  <!-- Windshield -->
  <rect x="11" y="5" width="18" height="8" rx="2" fill="rgba(147,210,255,0.75)"/>
  <!-- Side windows row 1 -->
  <rect x="11" y="15.5" width="8" height="5" rx="1.5" fill="rgba(147,210,255,0.6)"/>
  <rect x="21" y="15.5" width="8" height="5" rx="1.5" fill="rgba(147,210,255,0.6)"/>
  <!-- Side windows row 2 -->
  <rect x="11" y="22.5" width="8" height="5" rx="1.5" fill="rgba(147,210,255,0.6)"/>
  <rect x="21" y="22.5" width="8" height="5" rx="1.5" fill="rgba(147,210,255,0.6)"/>
  <!-- Rear window / door -->
  <rect x="11" y="30" width="18" height="5" rx="2" fill="rgba(147,210,255,0.55)"/>
  <!-- Side body trim -->
  <rect x="9" y="21" width="22" height="1.5" fill="rgba(255,255,255,0.18)"/>
  <!-- Headlights -->
  <rect x="9" y="4" width="5.5" height="2.5" rx="1" fill="#fef08a"/>
  <rect x="25.5" y="4" width="5.5" height="2.5" rx="1" fill="#fef08a"/>
  <!-- Taillights -->
  <rect x="9" y="34" width="5.5" height="2.5" rx="1" fill="#f87171"/>
  <rect x="25.5" y="34" width="5.5" height="2.5" rx="1" fill="#f87171"/>
  <!-- Wheels -->
  <rect x="6" y="6" width="3.5" height="6.5" rx="1.5" fill="#1e293b"/>
  <rect x="30.5" y="6" width="3.5" height="6.5" rx="1.5" fill="#1e293b"/>
  <rect x="6" y="28" width="3.5" height="6.5" rx="1.5" fill="#1e293b"/>
  <rect x="30.5" y="28" width="3.5" height="6.5" rx="1.5" fill="#1e293b"/>
  <rect x="7" y="8" width="1.5" height="3" rx="0.5" fill="#94a3b8"/>
  <rect x="31.5" y="8" width="1.5" height="3" rx="0.5" fill="#94a3b8"/>
  <rect x="7" y="30" width="1.5" height="3" rx="0.5" fill="#94a3b8"/>
  <rect x="31.5" y="30" width="1.5" height="3" rx="0.5" fill="#94a3b8"/>
</svg>
