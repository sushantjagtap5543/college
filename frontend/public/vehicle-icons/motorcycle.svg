<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40">
  <!-- Black main body -->
  <rect x="17" y="5" width="6" height="30" rx="3" fill="#111827"/>
  <!-- Handlebar (chrome) -->
  <rect x="11" y="9" width="18" height="3.5" rx="1.5" fill="#374151"/>
  <!-- Handgrips -->
  <rect x="11" y="9" width="3" height="3.5" rx="1.5" fill="#94a3b8"/>
  <rect x="26" y="9" width="3" height="3.5" rx="1.5" fill="#94a3b8"/>
  <!-- Engine/fuel tank (red accent) -->
  <rect x="15.5" y="14" width="9" height="7" rx="2" fill="#dc2626"/>
  <!-- Seat (dark) -->
  <rect x="16" y="21" width="8" height="6" rx="1.5" fill="#1f2937"/>
  <!-- Seat stitching line -->
  <rect x="19.5" y="22" width="1" height="4" fill="rgba(255,255,255,0.15)"/>
  <!-- Front wheel (wide) -->
  <ellipse cx="20" cy="6" rx="3.5" ry="2.5" fill="#1e293b"/>
  <!-- Rear wheel (wide) -->
  <ellipse cx="20" cy="34" rx="3.5" ry="2.5" fill="#1e293b"/>
  <!-- Headlight -->
  <ellipse cx="20" cy="4.2" rx="2.2" ry="1.3" fill="#fef08a"/>
  <!-- Taillight -->
  <ellipse cx="20" cy="35.8" rx="1.5" ry="1" fill="#f87171"/>
  <!-- Exhaust pipe -->
  <rect x="22" y="28" width="5" height="1.5" rx="0.7" fill="#6b7280"/>
</svg>
