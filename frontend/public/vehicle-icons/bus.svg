<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40">
  <!-- Blue city bus body -->
  <rect x="8" y="2" width="24" height="36" rx="3" fill="#1d4ed8"/>
  <!-- Yellow stripe/livery band -->
  <rect x="8" y="18" width="24" height="4" fill="#eab308"/>
  <!-- Windshield (front) -->
  <rect x="10" y="4" width="20" height="7" rx="2" fill="rgba(147,210,255,0.8)"/>
  <!-- Passenger windows row 1 -->
  <rect x="10" y="13" width="5.5" height="4" rx="1" fill="rgba(147,210,255,0.65)"/>
  <rect x="17.25" y="13" width="5.5" height="4" rx="1" fill="rgba(147,210,255,0.65)"/>
  <rect x="24.5" y="13" width="5.5" height="4" rx="1" fill="rgba(147,210,255,0.65)"/>
  <!-- Passenger windows row 2 -->
  <rect x="10" y="23" width="5.5" height="4" rx="1" fill="rgba(147,210,255,0.65)"/>
  <rect x="17.25" y="23" width="5.5" height="4" rx="1" fill="rgba(147,210,255,0.65)"/>
  <rect x="24.5" y="23" width="5.5" height="4" rx="1" fill="rgba(147,210,255,0.65)"/>
  <!-- Rear window -->
  <rect x="10" y="29" width="20" height="7" rx="2" fill="rgba(147,210,255,0.7)"/>
  <!-- Front door line -->
  <rect x="21" y="4" width="1" height="7" fill="rgba(0,0,0,0.2)"/>
  <!-- Headlights -->
  <rect x="8" y="3" width="6" height="2.5" rx="1" fill="#fef08a"/>
  <rect x="26" y="3" width="6" height="2.5" rx="1" fill="#fef08a"/>
  <!-- Taillights -->
  <rect x="8" y="34.5" width="6" height="2.5" rx="1" fill="#f87171"/>
  <rect x="26" y="34.5" width="6" height="2.5" rx="1" fill="#f87171"/>
  <!-- Wheels -->
  <rect x="5" y="5" width="3.5" height="8" rx="1.5" fill="#1e293b"/>
  <rect x="31.5" y="5" width="3.5" height="8" rx="1.5" fill="#1e293b"/>
  <rect x="5" y="27" width="3.5" height="8" rx="1.5" fill="#1e293b"/>
  <rect x="31.5" y="27" width="3.5" height="8" rx="1.5" fill="#1e293b"/>
  <rect x="6" y="7" width="1.5" height="4" rx="0.5" fill="#1d4ed8"/>
  <rect x="32.5" y="7" width="1.5" height="4" rx="0.5" fill="#1d4ed8"/>
</svg>
