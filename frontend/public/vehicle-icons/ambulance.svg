<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40">
  <!-- White ambulance body -->
  <rect x="9" y="3" width="22" height="34" rx="4" fill="#f8fafc"/>
  <!-- Grey outline edge -->
  <rect x="9" y="3" width="22" height="34" rx="4" fill="none" stroke="#cbd5e1" stroke-width="1"/>
  <!-- Windshield -->
  <rect x="11" y="5" width="18" height="8" rx="2" fill="rgba(147,210,255,0.75)"/>
  <!-- Red + cross symbol -->
  <rect x="17.5" y="16" width="5" height="12" rx="1" fill="#dc2626"/>
  <rect x="14" y="19.5" width="12" height="5" rx="1" fill="#dc2626"/>
  <!-- Blue/red light bar -->
  <rect x="13" y="3.5" width="6" height="2" rx="1" fill="#3b82f6"/>
  <rect x="21" y="3.5" width="6" height="2" rx="1" fill="#dc2626"/>
  <!-- Headlights -->
  <rect x="9" y="4.5" width="5.5" height="2.5" rx="1" fill="#fef08a"/>
  <rect x="25.5" y="4.5" width="5.5" height="2.5" rx="1" fill="#fef08a"/>
  <!-- Taillights -->
  <rect x="9" y="34" width="5.5" height="2.5" rx="1" fill="#f87171"/>
  <rect x="25.5" y="34" width="5.5" height="2.5" rx="1" fill="#f87171"/>
  <!-- Rear window -->
  <rect x="11" y="30" width="18" height="5" rx="2" fill="rgba(147,210,255,0.6)"/>
  <!-- Wheels -->
  <rect x="6" y="6" width="3.5" height="6.5" rx="1.5" fill="#1e293b"/>
  <rect x="30.5" y="6" width="3.5" height="6.5" rx="1.5" fill="#1e293b"/>
  <rect x="6" y="28" width="3.5" height="6.5" rx="1.5" fill="#1e293b"/>
  <rect x="30.5" y="28" width="3.5" height="6.5" rx="1.5" fill="#1e293b"/>
</svg>
