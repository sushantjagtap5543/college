<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40">
  <!-- Red fire engine body -->
  <rect x="8" y="2" width="24" height="36" rx="3" fill="#dc2626"/>
  <!-- Windshield -->
  <rect x="10" y="4" width="20" height="7" rx="2" fill="rgba(147,210,255,0.75)"/>
  <!-- Equipment compartments -->
  <rect x="10" y="13" width="9" height="8" rx="1.5" fill="#b91c1c"/>
  <rect x="21" y="13" width="9" height="8" rx="1.5" fill="#b91c1c"/>
  <!-- Yellow/chrome hose reel compartment -->
  <rect x="10" y="23" width="20" height="7" rx="1.5" fill="#ca8a04"/>
  <!-- Water pump detail -->
  <circle cx="20" cy="26.5" r="3" fill="#dc2626"/>
  <circle cx="20" cy="26.5" r="1.5" fill="#92400e"/>
  <!-- Yellow/red light bar -->
  <rect x="12" y="2.5" width="7" height="2" rx="0.8" fill="#eab308"/>
  <rect x="21" y="2.5" width="7" height="2" rx="0.8" fill="#ef4444"/>
  <!-- Headlights -->
  <rect x="8" y="3" width="6" height="2.5" rx="1" fill="#fef08a"/>
  <rect x="26" y="3" width="6" height="2.5" rx="1" fill="#fef08a"/>
  <!-- Taillights -->
  <rect x="8" y="34.5" width="6" height="2.5" rx="1" fill="#f87171"/>
  <rect x="26" y="34.5" width="6" height="2.5" rx="1" fill="#f87171"/>
  <!-- Wheels -->
  <rect x="5" y="5" width="3.5" height="8" rx="1.5" fill="#1e293b"/>
  <rect x="31.5" y="5" width="3.5" height="8" rx="1.5" fill="#1e293b"/>
  <rect x="5" y="27" width="3.5" height="8" rx="1.5" fill="#1e293b"/>
  <rect x="31.5" y="27" width="3.5" height="8" rx="1.5" fill="#1e293b"/>
</svg>
