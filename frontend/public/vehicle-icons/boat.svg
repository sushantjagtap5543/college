<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40">
  <!-- Blue water hull (pointed bow = front = top) -->
  <path d="M20 2 C14 2,8 10,8 21 C8 31,13 38,20 38 C27 38,32 31,32 21 C32 10,26 2,20 2 Z" fill="#0369a1"/>
  <!-- White deck area -->
  <ellipse cx="20" cy="22" rx="8" ry="12" fill="#e0f2fe"/>
  <!-- Center keel line -->
  <rect x="19.5" y="4" width="1" height="32" rx="0.5" fill="rgba(3,105,161,0.4)"/>
  <!-- Cockpit / cabin -->
  <ellipse cx="20" cy="20" rx="5.5" ry="7.5" fill="#0284c7"/>
  <!-- Glass panels -->
  <ellipse cx="20" cy="17" rx="4" ry="3.5" fill="rgba(147,210,255,0.8)"/>
  <!-- Portholes -->
  <circle cx="15" cy="23" r="2" fill="#0369a1"/>
  <circle cx="25" cy="23" r="2" fill="#0369a1"/>
  <circle cx="15" cy="23" r="1" fill="rgba(147,210,255,0.6)"/>
  <circle cx="25" cy="23" r="1" fill="rgba(147,210,255,0.6)"/>
  <!-- Bow navigation light (white) -->
  <circle cx="20" cy="3.5" r="1.8" fill="#fef08a"/>
  <!-- Stern lights (red left, green right) -->
  <circle cx="14" cy="36" r="1.5" fill="#f87171"/>
  <circle cx="26" cy="36" r="1.5" fill="#4ade80"/>
  <!-- Wake lines -->
  <path d="M10 30 Q8 32,9 34" stroke="#bfdbfe" stroke-width="1" fill="none" opacity="0.6"/>
  <path d="M30 30 Q32 32,31 34" stroke="#bfdbfe" stroke-width="1" fill="none" opacity="0.6"/>
</svg>
