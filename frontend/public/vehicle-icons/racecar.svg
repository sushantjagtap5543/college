<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40">
  <!-- Low wide racing body -->
  <rect x="11" y="7" width="18" height="26" rx="4" fill="#dc2626"/>
  <!-- Front spoiler / splitter -->
  <rect x="10" y="6" width="20" height="3" rx="1" fill="#7f1d1d"/>
  <!-- Rear diffuser -->
  <rect x="10" y="31" width="20" height="3" rx="1" fill="#7f1d1d"/>
  <!-- Large windshield (racing) -->
  <rect x="13" y="10" width="14" height="10" rx="2" fill="rgba(147,210,255,0.8)"/>
  <!-- Center cockpit strip -->
  <rect x="18" y="11" width="4" height="8" rx="1" fill="rgba(0,0,0,0.3)"/>
  <!-- Racing stripe -->
  <rect x="18.5" y="7" width="3" height="26" fill="rgba(255,255,255,0.15)"/>
  <!-- Side vents -->
  <rect x="11" y="22" width="4" height="2" rx="0.5" fill="#7f1d1d"/>
  <rect x="25" y="22" width="4" height="2" rx="0.5" fill="#7f1d1d"/>
  <!-- Headlights (thin, aggressive) -->
  <rect x="11" y="7" width="7" height="2" rx="0.5" fill="#fef08a"/>
  <rect x="22" y="7" width="7" height="2" rx="0.5" fill="#fef08a"/>
  <!-- Taillights -->
  <rect x="11" y="31" width="7" height="2" rx="0.5" fill="#f87171"/>
  <rect x="22" y="31" width="7" height="2" rx="0.5" fill="#f87171"/>
  <!-- Wide low wheels -->
  <rect x="7" y="9" width="4" height="5" rx="1.5" fill="#1e293b"/>
  <rect x="29" y="9" width="4" height="5" rx="1.5" fill="#1e293b"/>
  <rect x="7" y="26" width="4" height="5" rx="1.5" fill="#1e293b"/>
  <rect x="29" y="26" width="4" height="5" rx="1.5" fill="#1e293b"/>
  <!-- Rim detail -->
  <rect x="8.5" y="10.5" width="1" height="2" rx="0.3" fill="#64748b"/>
  <rect x="30.5" y="10.5" width="1" height="2" rx="0.3" fill="#64748b"/>
</svg>
