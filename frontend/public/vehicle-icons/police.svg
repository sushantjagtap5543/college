<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40">
  <!-- Dark navy police body -->
  <rect x="12" y="4" width="16" height="32" rx="6" fill="#1e3a5f"/>
  <!-- Windshield -->
  <rect x="14" y="8" width="12" height="7" rx="2" fill="rgba(147,210,255,0.75)"/>
  <!-- Cabin body -->
  <rect x="13" y="15" width="14" height="9" rx="2" fill="rgba(255,255,255,0.06)"/>
  <!-- Rear window -->
  <rect x="14" y="25" width="12" height="5" rx="2" fill="rgba(147,210,255,0.55)"/>
  <!-- Police light bar (red + blue alternating) -->
  <rect x="14.5" y="5.5" width="4.5" height="2" rx="0.8" fill="#ef4444"/>
  <rect x="20" y="5.5" width="4.5" height="2" rx="0.8" fill="#3b82f6"/>
  <!-- White side stripe -->
  <rect x="12" y="21" width="16" height="1.5" fill="rgba(255,255,255,0.3)"/>
  <!-- "POLICE" text bar -->
  <rect x="14" y="17.5" width="12" height="2.5" rx="0.5" fill="rgba(255,255,255,0.12)"/>
  <!-- Headlights -->
  <rect x="12" y="5" width="4.5" height="2.5" rx="1" fill="#fef08a"/>
  <rect x="23.5" y="5" width="4.5" height="2.5" rx="1" fill="#fef08a"/>
  <!-- Taillights -->
  <rect x="12" y="32.5" width="4.5" height="2.5" rx="1" fill="#f87171"/>
  <rect x="23.5" y="32.5" width="4.5" height="2.5" rx="1" fill="#f87171"/>
  <!-- Wheels -->
  <rect x="9" y="7" width="3.5" height="6" rx="1.5" fill="#1e293b"/>
  <rect x="27.5" y="7" width="3.5" height="6" rx="1.5" fill="#1e293b"/>
  <rect x="9" y="27" width="3.5" height="6" rx="1.5" fill="#1e293b"/>
  <rect x="27.5" y="27" width="3.5" height="6" rx="1.5" fill="#1e293b"/>
</svg>
