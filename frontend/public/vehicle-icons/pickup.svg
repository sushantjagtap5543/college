<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40">
  <!-- Cabin -->
  <rect x="11" y="4" width="18" height="18" rx="5" fill="#78716c"/>
  <!-- Windshield -->
  <rect x="13" y="7" width="14" height="7.5" rx="2" fill="rgba(147,210,255,0.75)"/>
  <!-- Rear cabin window -->
  <rect x="13" y="16" width="14" height="3.5" rx="1.5" fill="rgba(147,210,255,0.5)"/>
  <!-- Cabin–bed divider -->
  <rect x="11" y="21" width="18" height="2" rx="0" fill="#57534e"/>
  <!-- Cargo bed -->
  <rect x="11" y="22" width="18" height="14" rx="2" fill="#a8a29e"/>
  <!-- Bed floor detail -->
  <rect x="13" y="24" width="5" height="10" rx="0.5" fill="rgba(0,0,0,0.1)"/>
  <rect x="19" y="24" width="5" height="10" rx="0.5" fill="rgba(0,0,0,0.1)"/>
  <!-- Headlights -->
  <rect x="11" y="5" width="4.5" height="2.5" rx="1" fill="#fef08a"/>
  <rect x="24.5" y="5" width="4.5" height="2.5" rx="1" fill="#fef08a"/>
  <!-- Taillights -->
  <rect x="11" y="33.5" width="4.5" height="2.5" rx="1" fill="#f87171"/>
  <rect x="24.5" y="33.5" width="4.5" height="2.5" rx="1" fill="#f87171"/>
  <!-- Wheels -->
  <rect x="8" y="6" width="3.5" height="6.5" rx="1.5" fill="#1e293b"/>
  <rect x="28.5" y="6" width="3.5" height="6.5" rx="1.5" fill="#1e293b"/>
  <rect x="8" y="27.5" width="3.5" height="7" rx="1.5" fill="#1e293b"/>
  <rect x="28.5" y="27.5" width="3.5" height="7" rx="1.5" fill="#1e293b"/>
  <!-- Rims -->
  <rect x="9" y="8" width="1.5" height="3" rx="0.5" fill="#78716c"/>
  <rect x="29.5" y="8" width="1.5" height="3" rx="0.5" fill="#78716c"/>
  <rect x="9" y="29.5" width="1.5" height="3" rx="0.5" fill="#78716c"/>
  <rect x="29.5" y="29.5" width="1.5" height="3" rx="0.5" fill="#78716c"/>
</svg>
