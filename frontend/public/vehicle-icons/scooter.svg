<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40">
  <!-- White/pastel body (wider than moto) -->
  <rect x="15" y="6" width="10" height="28" rx="4" fill="#e2e8f0"/>
  <!-- Handlebar (narrower) -->
  <rect x="12" y="11" width="16" height="3" rx="1.5" fill="#cbd5e1"/>
  <!-- Step platform -->
  <rect x="13" y="20" width="14" height="5" rx="2" fill="#94a3b8"/>
  <!-- Seat -->
  <rect x="15.5" y="24" width="9" height="6" rx="2" fill="#64748b"/>
  <!-- Front shield -->
  <rect x="16" y="7" width="8" height="5" rx="2" fill="rgba(147,210,255,0.7)"/>
  <!-- Front wheel -->
  <ellipse cx="20" cy="7" rx="3" ry="2.2" fill="#1e293b"/>
  <!-- Rear wheel -->
  <ellipse cx="20" cy="34" rx="3" ry="2.2" fill="#1e293b"/>
  <!-- Headlight -->
  <ellipse cx="20" cy="5.5" rx="2" ry="1.2" fill="#fef08a"/>
  <!-- Taillight -->
  <rect x="17.5" y="34.5" width="5" height="2" rx="0.7" fill="#f87171"/>
</svg>
