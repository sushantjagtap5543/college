<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40">
  <!-- Frame (thin dark lines, bicycle style) -->
  <!-- Top tube -->
  <rect x="19" y="8" width="2" height="24" rx="1" fill="#374151"/>
  <!-- Down tube (diagonal-ish via rect) -->
  <rect x="17" y="14" width="6" height="12" rx="2" fill="#374151" opacity="0.5"/>
  <!-- Handlebar -->
  <rect x="12" y="10" width="16" height="2.5" rx="1.2" fill="#4b5563"/>
  <!-- Handgrips -->
  <rect x="12" y="9.5" width="3" height="3.5" rx="1.5" fill="#1e293b"/>
  <rect x="25" y="9.5" width="3" height="3.5" rx="1.5" fill="#1e293b"/>
  <!-- Seat post + seat -->
  <rect x="19" y="22" width="2" height="5" rx="1" fill="#374151"/>
  <rect x="16" y="26" width="8" height="2.5" rx="1.2" fill="#1e293b"/>
  <!-- Pedals -->
  <rect x="14" y="21" width="5" height="2" rx="1" fill="#6b7280"/>
  <rect x="21" y="21" width="5" height="2" rx="1" fill="#6b7280"/>
  <!-- Front wheel (thin ring) -->
  <circle cx="20" cy="7" r="4" fill="none" stroke="#1e293b" stroke-width="2.5"/>
  <circle cx="20" cy="7" r="1.5" fill="#1e293b"/>
  <!-- Rear wheel -->
  <circle cx="20" cy="33" r="4" fill="none" stroke="#1e293b" stroke-width="2.5"/>
  <circle cx="20" cy="33" r="1.5" fill="#1e293b"/>
  <!-- Chain (bottom) -->
  <rect x="19" y="23" width="2" height="10" rx="0.5" fill="#6b7280" opacity="0.6"/>
</svg>
